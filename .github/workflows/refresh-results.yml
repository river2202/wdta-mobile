name: Refresh WDTA results

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh cached results
        run: npm run refresh:data

      - name: Commit cache changes
        run: |
          if git diff --quiet -- data/wdta-results.json; then
            echo "No cache changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/wdta-results.json
            git commit -m "Refresh WDTA results cache"
            git push
          fi

